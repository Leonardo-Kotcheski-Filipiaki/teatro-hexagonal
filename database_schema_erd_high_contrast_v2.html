
<style>
#erd svg { width: 100%; }
</style>
<div id="erd" style="padding:8px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#222222',
    textColor: dark ? '#c2c0b6' : '#111111',
    primaryColor: dark ? '#2d2d2d' : '#ffffff',
    primaryBorderColor: dark ? '#9c9a92' : '#222222',
    primaryTextColor: dark ? '#c2c0b6' : '#111111',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  THEATER {
    bigint id PK
    varchar name
    varchar address
    varchar city
    int capacity
    timestamp created_at
    timestamp updated_at
  }
  EVENT {
    bigint id PK
    bigint theater_id FK
    varchar name
    timestamp event_date
    int total_seats
    int available_seats
    varchar status
    timestamp created_at
    timestamp updated_at
  }
  SEAT {
    bigint id PK
    bigint event_id FK
    varchar seat_code
    enum status
    timestamp reserved_at
    timestamp expires_at
  }
  BOOKING {
    bigint id PK
    bigint event_id FK
    varchar subscriber_name
    varchar subscriber_email
    varchar subscriber_phone
    timestamp booked_at
    timestamp created_at
  }
  BOOKING_SEAT {
    bigint booking_id FK
    bigint seat_id FK
  }
  THEATER ||--o{ EVENT : "possui"
  EVENT ||--|{ SEAT : "contém"
  EVENT ||--o{ BOOKING : "recebe"
  BOOKING ||--|{ BOOKING_SEAT : "inclui"
  SEAT ||--o{ BOOKING_SEAT : "referenciado por"
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});

document.querySelectorAll('#erd svg rect').forEach(rect => {
  rect.setAttribute('fill', '#f8f9fa');
  rect.setAttribute('stroke', '#222222');
  rect.setAttribute('stroke-width', '2');
});

document.querySelectorAll('#erd svg text').forEach(text => {
  text.setAttribute('fill', '#111111');
  text.setAttribute('font-weight', '600');
});

document.querySelectorAll('#erd svg path').forEach(path => {
  if (path.getAttribute('stroke') && path.getAttribute('stroke') !== 'none') {
    path.setAttribute('stroke', '#222222');
    path.setAttribute('stroke-width', '2');
  }
});


document.querySelectorAll('#erd svg .er.attributeBoxOdd text, #erd svg .er.attributeBoxEven text, #erd svg .er text, #erd svg tspan').forEach(el => {
  el.setAttribute('fill', '#000000');
  el.setAttribute('font-weight', '700');
});

</script>
