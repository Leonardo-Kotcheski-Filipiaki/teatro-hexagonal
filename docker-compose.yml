  auth-service:
    image: teatro-auth-service
    container_name: auth
    ports:
      - "8084:8084"
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    expose:
      - "8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/theater_db
      DB_USERNAME: root
      DB_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  theater-service:
    image: teatro-theater-service
    container_name: theater
    ports:
      - "8081:8081"
    build:
      context: .
      dockerfile: theater-service/Dockerfile
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/theater_db
      SPRING_DATA_REDIS_HOST: redis
      EVENT_SERVICE_URL: http://event:8082/
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  event-service:
    image: teatro-event-service
    container_name: event
    ports:
      - "8082:8082"
    build:
      context: .
      dockerfile: event-service/Dockerfile
    expose:
      - "8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/theater_db
      SPRING_DATA_REDIS_HOST: redis
      RESERVATION_SERVICE_URL: http://reservation:8083/
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  reservation-service:
    image: teatro-reservation-service
    container_name: reservation
    ports:
      - "8083:8083"
    build:
      context: .
      dockerfile: reservation-service/Dockerfile
    expose:
      - "8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/theater_db
      SPRING_DATA_REDIS_HOST: redis
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: theater_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7.2-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: