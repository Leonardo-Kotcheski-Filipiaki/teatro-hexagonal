version: '3.9'

services:

  api-gateway:
    image: teatro-gateway-service
    container_name: gateway
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8084
      THEATER_SERVICE_URL: http://theater-service:8081
      EVENT_SERVICE_URL: http://event-service:8082
      RESERVATION_SERVICE_URL: http://reservation-service:8083
    env_file:
      - .env
    depends_on:
      - auth-service
      - theater-service
      - event-service
      - reservation-service

  auth-service:
    image: teatro-auth-service
    container_name: auth
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    expose:
      - "8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/theater_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET}
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  theater-service:
    image: teatro-theater-service
    container_name: theater
    build:
      context: .
      dockerfile: theater-service/Dockerfile
    expose:
      - "8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/theater_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_DATA_REDIS_HOST: redis
      EVENT_SERVICE_URL: http://event:8082/
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  event-service:
    image: teatro-event-service
    container_name: event
    build:
      context: .
      dockerfile: event-service/Dockerfile
    expose:
      - "8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/theater_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_DATA_REDIS_HOST: redis
      RESERVATION_SERVICE_URL: http://reservation:8083/
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  reservation-service:
    image: teatro-reservation-service
    container_name: reservation
    build:
      context: .
      dockerfile: reservation-service/Dockerfile
    expose:
      - "8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/theater_db
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
      SPRING_DATA_REDIS_HOST: redis
    env_file:
      - .env
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: theater_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7.2-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: